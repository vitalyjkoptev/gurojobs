<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 666 769" width="666" height="769">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#015EA7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#015EA7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="20" y="20" width="626" height="729" rx="30" ry="30" fill="url(#bg)" transform="rotate(-5, 333, 384)"/>

  <!-- Decorative waves -->
  <g opacity="0.1" transform="rotate(-5, 333, 384)">
    <path d="M20,200 Q180,150 333,200 Q486,250 646,200" stroke="#fff" stroke-width="2" fill="none"/>
    <path d="M20,250 Q180,200 333,250 Q486,300 646,250" stroke="#fff" stroke-width="2" fill="none"/>
    <path d="M20,300 Q180,250 333,300 Q486,350 646,300" stroke="#fff" stroke-width="2" fill="none"/>
    <path d="M20,350 Q180,300 333,350 Q486,400 646,350" stroke="#fff" stroke-width="2" fill="none"/>
    <path d="M20,400 Q180,350 333,400 Q486,450 646,400" stroke="#fff" stroke-width="2" fill="none"/>
    <path d="M20,450 Q180,400 333,450 Q486,500 646,450" stroke="#fff" stroke-width="2" fill="none"/>
    <path d="M20,500 Q180,450 333,500 Q486,550 646,500" stroke="#fff" stroke-width="2" fill="none"/>
  </g>

  <!-- Floating cards -->
  <!-- Card 1: Job card -->
  <g filter="url(#shadow)" transform="translate(80, 120)">
    <rect width="280" height="90" rx="12" fill="#fff"/>
    <circle cx="40" cy="45" r="22" fill="#E8F4FD"/>
    <text x="40" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#015EA7">GJ</text>
    <text x="75" y="35" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Casino Manager</text>
    <text x="75" y="55" font-family="Arial,sans-serif" font-size="11" fill="#666">Malta · Full-time</text>
    <text x="75" y="75" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#015EA7">€8,000/mo</text>
    <rect x="200" y="55" width="60" height="24" rx="12" fill="#015EA7"/>
    <text x="230" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#fff">Apply</text>
  </g>

  <!-- Card 2: Stats card -->
  <g filter="url(#shadow)" transform="translate(320, 280)">
    <rect width="240" height="80" rx="12" fill="#fff"/>
    <text x="20" y="30" font-family="Arial,sans-serif" font-size="11" fill="#666">Open Positions</text>
    <text x="20" y="58" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#015EA7">2,450+</text>
    <!-- Mini chart -->
    <polyline points="140,55 160,40 180,48 200,30 220,35" stroke="#00BCD4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="220" cy="35" r="4" fill="#00BCD4"/>
  </g>

  <!-- Card 3: Profile card -->
  <g filter="url(#shadow)" transform="translate(60, 380)">
    <rect width="220" height="100" rx="12" fill="#fff"/>
    <circle cx="45" cy="50" r="25" fill="#E8F4FD"/>
    <text x="45" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#015EA7">👤</text>
    <text x="85" y="38" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Your Profile</text>
    <text x="85" y="55" font-family="Arial,sans-serif" font-size="10" fill="#666">85% Complete</text>
    <!-- Progress bar -->
    <rect x="85" y="65" width="115" height="6" rx="3" fill="#E8F4FD"/>
    <rect x="85" y="65" width="98" height="6" rx="3" fill="url(#accent)"/>
  </g>

  <!-- Card 4: Category chips -->
  <g filter="url(#shadow)" transform="translate(200, 530)">
    <rect width="350" height="70" rx="12" fill="#fff"/>
    <text x="15" y="25" font-family="Arial,sans-serif" font-size="10" fill="#666">Popular Categories</text>
    <!-- Chips -->
    <rect x="15" y="38" width="75" height="22" rx="11" fill="#E8F4FD"/>
    <text x="52" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#015EA7">Gambling</text>
    <rect x="98" y="38" width="60" height="22" rx="11" fill="#E8F4FD"/>
    <text x="128" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#015EA7">Betting</text>
    <rect x="166" y="38" width="55" height="22" rx="11" fill="#E8F4FD"/>
    <text x="193" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#015EA7">Crypto</text>
    <rect x="229" y="38" width="55" height="22" rx="11" fill="#E8F4FD"/>
    <text x="256" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#015EA7">FinTech</text>
    <rect x="292" y="38" width="45" height="22" rx="11" fill="#E8F4FD"/>
    <text x="314" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#015EA7">Nutra</text>
  </g>

  <!-- Decorative dots -->
  <g fill="#00BCD4" opacity="0.4">
    <circle cx="580" cy="150" r="4"/><circle cx="600" cy="150" r="4"/><circle cx="620" cy="150" r="4"/>
    <circle cx="580" cy="170" r="4"/><circle cx="600" cy="170" r="4"/><circle cx="620" cy="170" r="4"/>
    <circle cx="580" cy="190" r="4"/><circle cx="600" cy="190" r="4"/><circle cx="620" cy="190" r="4"/>
  </g>
  <g fill="#fff" opacity="0.15">
    <circle cx="50" cy="550" r="3"/><circle cx="65" cy="550" r="3"/><circle cx="80" cy="550" r="3"/>
    <circle cx="50" cy="565" r="3"/><circle cx="65" cy="565" r="3"/><circle cx="80" cy="565" r="3"/>
    <circle cx="50" cy="580" r="3"/><circle cx="65" cy="580" r="3"/><circle cx="80" cy="580" r="3"/>
  </g>

  <!-- Floating icons -->
  <g filter="url(#glow)" opacity="0.3">
    <text x="500" y="450" font-size="40" fill="#fff">🎰</text>
    <text x="120" y="280" font-size="30" fill="#fff">💼</text>
    <text x="450" y="650" font-size="35" fill="#fff">🌍</text>
  </g>
</svg>